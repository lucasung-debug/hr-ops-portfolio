<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://smjportfolio.com/career.html">
  <title>경력기술서 — 성명재</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="content.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #2563eb;
      --brand-light: #dbeafe;
      --gray-900: #0f172a;
      --gray-700: #334155;
      --gray-500: #64748b;
      --gray-300: #cbd5e1;
      --gray-100: #f1f5f9;
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--gray-900);
      background: white;
      line-height: 1.58;
      word-break: keep-all;
    }
    .page { max-width: 794px; margin: 0 auto; padding: 20px 0; }
    .a4-page {
      background: white;
      margin: 0 auto 32px;
      padding: 34px 42px;
      max-width: 794px;
    }
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #1e293b;
      color: white;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar h1 { font-size: 14px; font-weight: 800; }
    .toolbar-actions { display: flex; gap: 8px; }
    .btn {
      border: 0;
      border-radius: 7px;
      padding: 7px 14px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary { background: #4f46e5; }
    @media screen {
      body { background: var(--gray-100); padding-top: 54px; }
      .a4-page {
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.12);
        border-radius: 8px;
      }
    }
    .doc-header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 16px;
      border-bottom: 3px solid var(--brand);
      margin-bottom: 22px;
    }
    .name { font-size: 25pt; font-weight: 900; letter-spacing: -0.01em; }
    .title { margin-top: 3px; color: var(--brand); font-size: 11pt; font-weight: 800; }
    .contact { text-align: right; color: var(--gray-500); font-size: 9.5pt; line-height: 1.75; }
    .section-title {
      color: var(--brand);
      font-size: 12pt;
      font-weight: 900;
      margin: 22px 0 10px;
      padding-bottom: 5px;
      border-bottom: 2px solid var(--brand-light);
    }
    .role {
      padding: 14px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #fff;
      break-inside: avoid;
    }
    .role-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .role-company { font-size: 12pt; font-weight: 900; color: var(--gray-900); }
    .role-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--gray-500);
      font-size: 8.5pt;
      font-weight: 800;
      margin-top: 3px;
    }
    .employment-type {
      color: var(--brand);
      background: var(--brand-light);
      border-radius: 999px;
      padding: 1px 7px;
    }
    .role-period {
      color: var(--gray-500);
      font-size: 9pt;
      font-weight: 800;
      white-space: nowrap;
    }
    .summary { color: var(--gray-700); font-size: 9.5pt; margin: 6px 0 9px; }
    .departure-reason { color: var(--gray-500); font-size: 8.5pt; margin: -3px 0 9px; }
    .departure-reason strong { color: var(--gray-700); margin-right: 6px; }
    .achievements { list-style: none; padding-left: 0; display: grid; gap: 6px; }
    .achievements li {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      align-items: start;
      color: var(--gray-700);
      font-size: 9pt;
    }
    .metric {
      color: var(--brand);
      font-weight: 900;
      letter-spacing: 0;
    }
    .empty {
      color: var(--gray-500);
      background: var(--gray-100);
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      font-size: 10pt;
      text-align: center;
    }
    @media print {
      @page { size: A4; margin: 12mm 14mm; }
      .toolbar { display: none !important; }
      body { background: white; padding-top: 0 !important; font-size: 9pt; }
      .page, .a4-page { max-width: 100%; padding: 0; margin: 0; box-shadow: none; border-radius: 0; }
      .doc-header { margin-bottom: 16px; padding-bottom: 12px; }
      .name { font-size: 21pt; }
      .section-title { font-size: 10.5pt; margin: 16px 0 8px; }
      .role { padding: 10px 12px; margin-bottom: 9px; }
      .role-company { font-size: 10.5pt; }
      .summary, .achievements li { font-size: 8.5pt; line-height: 1.45; }
      .achievements li { grid-template-columns: 78px 1fr; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>경력기술서 — 성명재</h1>
    <div class="toolbar-actions">
      <button class="btn" onclick="window.close(); location.href='index.html';">돌아가기</button>
      <button class="btn primary" onclick="window.print()">PDF 저장 / 인쇄</button>
    </div>
  </div>

  <main class="page">
    <section class="a4-page">
      <header class="doc-header">
        <div>
          <div class="name" id="profile-name">성명재</div>
          <div class="title" id="profile-title">HR Operations</div>
        </div>
        <div class="contact">
          <div id="profile-email">proposition97@gmail.com</div>
          <div>smjportfolio.com</div>
          <div id="last-updated"></div>
        </div>
      </header>

      <h2 class="section-title">Career Statement</h2>
      <div id="career-list"></div>
    </section>
  </main>

  <script>
  (function() {
    var D = (typeof SITE_CONTENT !== 'undefined') ? SITE_CONTENT : {};
    var rows = Array.isArray(D.careerHistory) ? D.careerHistory : [];

    function setText(id, value) {
      var el = document.getElementById(id);
      if (el && value) el.textContent = value;
    }

    function splitAchievement(line) {
      var text = String(line || '').trim();
      var match = text.match(/^([^\s]+)(?:\s+(.+))?$/);
      if (!match) return { metric: '', detail: text };
      return { metric: match[1] || '', detail: match[2] || '' };
    }

    function roleHtml(role) {
      var details = (role.details || role.achievements || []).filter(Boolean);
      var items = details.map(function(item) {
        var parts = splitAchievement(item);
        return '<li><span class="metric">' + escapeHtml(parts.metric) + '</span><span>' + escapeHtml(parts.detail) + '</span></li>';
      }).join('');
      var title = [role.company, role.department, role.position].filter(Boolean).join(' · ');
      var meta = [role.employmentType, role.status].filter(Boolean);
      return '<article class="role">'
        + '<div class="role-head">'
        + '<div><div class="role-company">' + escapeHtml(title) + '</div>'
        + (meta.length ? '<div class="role-meta">'
          + (role.employmentType ? '<span class="employment-type">' + escapeHtml(role.employmentType) + '</span>' : '')
          + (role.status ? '<span>' + escapeHtml(role.status) + '</span>' : '')
          + '</div>' : '')
        + '</div>'
        + '<div class="role-period">' + escapeHtml(role.period || '') + '</div>'
        + '</div>'
        + (role.summary ? '<p class="summary">' + escapeHtml(role.summary) + '</p>' : '')
        + (role.departureReason ? '<p class="departure-reason"><strong>퇴사 사유</strong>' + escapeHtml(role.departureReason) + '</p>' : '')
        + (items ? '<ul class="achievements">' + items + '</ul>' : '')
        + '</article>';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    setText('profile-name', D.profileName || '성명재');
    setText('profile-title', D.profileTitle || 'HR Operations');
    setText('profile-email', D.email || '');
    setText('last-updated', D.lastUpdated ? '최종 업데이트: ' + D.lastUpdated : '');

    var list = document.getElementById('career-list');
    if (!rows.length) {
      list.innerHTML = '<div class="empty">경력 DB 연결 후 발행된 경력 항목이 표시됩니다.</div>';
      return;
    }
    list.innerHTML = rows.map(roleHtml).join('');
  })();
  </script>
</body>
</html>
