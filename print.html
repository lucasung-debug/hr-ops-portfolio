<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오 인쇄용 — 성명재</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="content.js"></script>
    <style>
        /* ===== 기본 스타일 ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #2563eb; --brand-light: #dbeafe; --brand-text: #1d4ed8;
            --gray-900: #0f172a; --gray-700: #334155; --gray-500: #64748b; --gray-300: #cbd5e1; --gray-100: #f1f5f9;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            font-size: 11pt; color: var(--gray-900); background: white;
            line-height: 1.6; word-break: keep-all;
        }
        .page { max-width: 794px; margin: 0 auto; padding: 20px 0; }
        h2 { font-size: 13pt; font-weight: 800; color: var(--brand); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--brand-light); }
        h3 { font-size: 11pt; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
        h4 { font-size: 10pt; font-weight: 700; color: var(--brand); margin: 10px 0 4px; }
        p, li { font-size: 10pt; color: var(--gray-700); line-height: 1.65; }
        ul { padding-left: 16px; }
        li { margin-bottom: 3px; }
        strong { font-weight: 700; color: var(--gray-900); }

        /* ===== 화면 전용 ===== */
        @media screen {
            body { background: #f1f5f9; }
            .a4-page {
                background: white;
                margin: 0 auto 32px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.10);
                border-radius: 8px;
                padding: 28px 40px;
                max-width: 794px;
            }
            .print-toolbar {
                position: fixed; top: 0; left: 0; right: 0; z-index: 100;
                background: #1e293b; color: white; padding: 10px 24px;
                display: flex; align-items: center; justify-content: space-between;
            }
            .print-toolbar h1 { font-size: 14px; font-weight: 700; }
            .print-toolbar-btns { display: flex; gap: 8px; }
            .btn-print { background: #4f46e5; color: white; border: none; padding: 7px 18px; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; }
            .btn-print:hover { background: #4338ca; }
            .btn-back { background: rgba(255,255,255,0.1); color: white; border: none; padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
            .btn-back:hover { background: rgba(255,255,255,0.2); }
            body { padding-top: 54px; }
        }

        /* ===== 인쇄 전용 ===== */
        @media print {
            @page { size: A4; margin: 14mm 16mm; }
            .print-toolbar { display: none !important; }
            body { background: white; font-size: 9.5pt; padding-top: 0 !important; }
            .page { max-width: 100%; padding: 0; }
            .a4-page { page-break-after: always; }
            .a4-page:last-child { page-break-after: auto; }
            /* 섹션 제목이 고아로 남지 않도록 */
            h2 { break-after: avoid; font-size: 11pt; }
            h3 { break-after: avoid; }
            /* 개별 항목 내부에서 페이지 넘김 방지 */
            .career-item { break-inside: avoid; page-break-inside: avoid; }
            .dx-item { break-inside: avoid; page-break-inside: avoid; }
            .act-item { break-inside: avoid; page-break-inside: avoid; }
            /* 2단 그리드 → 인쇄 시 단일 컬럼 */
            .two-col { display: block; }
            .two-col > div { margin-bottom: 16px; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        /* ===== 헤더 / 프로필 ===== */
        .print-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 16px; border-bottom: 3px solid var(--brand); margin-bottom: 24px; }
        .ph-name { font-size: 22pt; font-weight: 900; color: var(--gray-900); }
        .ph-title { font-size: 11pt; font-weight: 600; color: var(--brand); margin-top: 2px; }
        .ph-contact { text-align: right; font-size: 9.5pt; color: var(--gray-500); line-height: 1.8; }
        .ph-contact a { color: var(--brand); text-decoration: none; }
        .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .badge { background: var(--brand-light); color: var(--brand-text); font-size: 8.5pt; font-weight: 700; padding: 2px 8px; border-radius: 99px; }

        /* ===== 임팩트 박스 ===== */
        .impact-box { background: var(--brand-light); border-left: 4px solid var(--brand); padding: 10px 16px; border-radius: 0 8px 8px 0; margin-bottom: 20px; }
        .impact-box .impact-label { font-size: 8pt; font-weight: 800; color: var(--brand); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
        .impact-box .impact-text { font-size: 10.5pt; font-weight: 700; color: var(--gray-900); }

        /* ===== 경력 프로젝트 ===== */
        .career-item { margin-bottom: 18px; padding: 14px; background: var(--gray-100); border-radius: 8px; break-inside: avoid; }
        .career-item-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .career-title { font-size: 11pt; font-weight: 800; color: var(--gray-900); }
        .career-sub { font-size: 9pt; color: var(--gray-500); margin-top: 1px; }
        .career-modal { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--gray-300); font-size: 9.5pt; }

        /* ===== DX 사례 ===== */
        .dx-item { margin-bottom: 18px; break-inside: avoid; }
        .dx-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .dx-badge { background: #e0f2fe; color: #0369a1; font-size: 8pt; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
        .dx-content-wrap { padding-left: 0; font-size: 9.5pt; }
        .dx-content-wrap h4 { font-size: 9.5pt; }

        /* ===== 교육/활동 그리드 ===== */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        .edu-section { margin-bottom: 16px; }
        .edu-section h3 { font-size: 10pt; font-weight: 800; color: var(--brand); margin-bottom: 6px; }

        /* ===== 섹션 간격 ===== */
        .print-section { margin-bottom: 28px; }

        /* ===== Tailwind shim (content.js 인라인 HTML 대응) ===== */
        .flex { display: flex !important; }
        .justify-between { justify-content: space-between !important; }
        .items-center { align-items: center !important; }
        .gap-8 { gap: 2rem !important; }
        .gap-3 { gap: 0.75rem !important; }
        .space-y-3 > * + * { margin-top: 0.75rem; }
        .edu-section { break-inside: avoid; page-break-inside: avoid; }
    </style>
</head>
<body>

<!-- 화면 툴바 (인쇄 시 숨김) -->
<div class="print-toolbar">
    <h1>🖨️ 인쇄용 포트폴리오 — 성명재</h1>
    <div class="print-toolbar-btns">
        <input id="company-input" type="text" placeholder="채용 회사명 입력 (선택)" oninput="applyCompany(this.value)"
            style="padding:7px 12px;border-radius:7px;border:none;font-size:13px;width:200px;outline:none;color:#1e293b;">
        <button class="btn-back" onclick="history.back()">← 돌아가기</button>
        <button class="btn-print" onclick="window.print()">PDF 저장 / 인쇄</button>
    </div>
</div>

<div class="page" id="print-page">
    <!-- 콘텐츠는 JS로 렌더링 -->
    <div id="loading" style="text-align:center;padding:40px;color:#64748b;">불러오는 중...</div>
</div>

<script>
(async function() {
    // 콘텐츠 로드: KV API → localStorage → content.js
    async function loadData() {
        const defaults = typeof SITE_CONTENT !== 'undefined' ? JSON.parse(JSON.stringify(SITE_CONTENT)) : {};
        try {
            const r = await fetch('/api/content', { cache: 'no-store' });
            if (r.ok) { const d = await r.json(); if (d && typeof d === 'object') return Object.assign(defaults, d); }
        } catch(e) {}
        const saved = localStorage.getItem('portfolio_content');
        if (saved) { try { return Object.assign(defaults, JSON.parse(saved)); } catch(e) {} }
        return defaults;
    }

    const D = await loadData();
    const page = document.getElementById('print-page');

    // ── 헤더 렌더
    function renderHeader() {
        const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=https://smjportfolio.com&bgcolor=ffffff&color=1e293b&margin=4';
        return `
        <div id="company-label" style="display:none;font-size:9pt;font-weight:700;color:#2563eb;margin-bottom:8px;letter-spacing:0.04em;"></div>
        <div class="print-header">
            <div>
                <div class="ph-name">${D.profileName || '성명재'}</div>
                <div class="ph-title">${D.profileTitle || 'HR Operations'}</div>
                <div class="badge-row">
                    <span class="badge">HR Ops</span>
                    <span class="badge">Recruiter</span>
                    <span class="badge">Tableau</span>
                    <span class="badge">자동화</span>
                </div>
            </div>
            <div style="display:flex;gap:16px;align-items:flex-start;">
                <div class="ph-contact">
                    <div>${D.email || ''}</div>
                    <div><a href="https://smjportfolio.com">smjportfolio.com</a></div>
                    <div>최종 업데이트: ${D.lastUpdated || ''}</div>
                </div>
                <div style="text-align:center;">
                    <img src="${qrUrl}" width="72" height="72" alt="QR" style="display:block;border:1px solid #e2e8f0;border-radius:6px;">
                    <div style="font-size:7pt;color:#94a3b8;margin-top:3px;">포트폴리오</div>
                </div>
            </div>
        </div>`;
    }

    // ── 회사명 개인화
    window.applyCompany = function(name) {
        const el = document.getElementById('company-label');
        if (!el) return;
        if (name.trim()) {
            el.textContent = `📌 ${name.trim()} 채용담당자님께 제출합니다.`;
            el.style.display = 'block';
        } else {
            el.style.display = 'none';
        }
    };

    // ── 임팩트 박스
    function renderImpact() {
        const txt = (D.heroImpactHTML || '').replace(/<[^>]+>/g, ' ').trim();
        return `<div class="impact-box">
            <div class="impact-label">대표 임팩트 결과</div>
            <div class="impact-text">${txt}</div>
        </div>`;
    }

    // ── 결과 불릿 추출
    function extractResults(html) {
        if (!html) return '';
        const m = html.match(/결과[^<]*<\/h4>([\s\S]*?)<\/div>/);
        if (!m) return '';
        const ul = m[1].match(/<ul[\s\S]*?<\/ul>/);
        return ul ? ul[0] : '';
    }
    // ── 경력 프로젝트 (번호 + Result만)
    function renderCareers(start = 0, end = undefined, compact = false) {
        if (!D.careerProjects?.length) return '';
        const projects = D.careerProjects.slice(start, end);
        const sectionMargin = compact ? '18px' : '28px';
        const items = projects.map((p, i) => {
            const num = start + i + 1;
            return `
            <div class="career-item">
                <div class="career-item-head">
                    <div>
                        <div class="career-title">
                            <span style="color:var(--brand);margin-right:6px;">${num}.</span>${p.title || ''}
                        </div>
                        <div class="career-sub">${p.sub || ''}</div>
                    </div>
                </div>
                <div class="career-modal" style="font-size:9pt;">
                    <span style="font-size:8pt;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:0.06em;">Result</span>
                    ${extractResults(p.modalContent)}
                </div>
            </div>`;
        }).join('');
        return `<div class="print-section" style="margin-bottom:${sectionMargin}"><h2>경력 프로젝트</h2>${items}</div>`;
    }

    // ── DX 사례 (Background + Result만 파싱 추출)
    function extractDxSection(html, keyword) {
        if (!html) return '';
        const m = html.match(new RegExp(keyword + '[\\s\\S]*?<\\/strong>([\\s\\S]*?)<\\/div>'));
        if (!m) return '';
        return m[1].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    }
    function renderDx(compact = false) {
        if (!D.dxCases) return '';
        const cases = Object.values(D.dxCases);
        if (!cases.length) return '';
        const itemMargin = compact ? '14px' : '18px';
        const items = cases.map((c, i) => {
            const bg = extractDxSection(c.content, 'Background');
            const result = extractDxSection(c.content, 'Result') || extractDxSection(c.content, 'Future Plan');
            return `<div class="dx-item" style="margin-bottom:${itemMargin}">
                <div class="dx-head">
                    <strong style="font-size:10.5pt;color:var(--gray-900);">
                        <span style="color:var(--brand);margin-right:6px;">${i + 1}.</span>${c.title || ''}
                    </strong>
                    <span class="dx-badge">${c.badge || ''}</span>
                </div>
                ${bg ? `<div style="margin:4px 0 6px;">
                    <span style="font-size:7.5pt;font-weight:800;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.07em;">Background</span>
                    <p style="font-size:9pt;color:var(--gray-700);margin-top:2px;line-height:1.5;">${bg}</p>
                </div>` : ''}
                ${result ? `<div>
                    <span style="font-size:7.5pt;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:0.07em;">Result</span>
                    <p style="font-size:9pt;font-weight:700;color:var(--gray-900);margin-top:2px;">${result}</p>
                </div>` : ''}
            </div>`;
        }).join('');
        return `<div class="print-section"><h2>DX / 업무 자동화 사례</h2>${items}</div>`;
    }

    // ── 교육/스킬
    function renderEducation() {
        if (!D.education) return '';
        const { academic, skills } = D.education;
        // trainingList 배열로 직무교육 렌더
        const trainingHtml = (D.trainingList || []).map(t => `
            <div style="margin-bottom:8px;padding:8px 10px;background:var(--gray-100);border-radius:6px;break-inside:avoid;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                    <div>
                        <strong style="font-size:9.5pt;">${t.title || ''}</strong>
                        <div style="font-size:8.5pt;color:var(--gray-500);margin-top:1px;">${t.org || ''} · ${t.dates || ''}</div>
                        <div style="font-size:8.5pt;color:var(--gray-700);margin-top:2px;">${t.desc || ''}</div>
                    </div>
                    <span style="font-size:8pt;font-weight:700;color:var(--brand);white-space:nowrap;">${t.status || ''}</span>
                </div>
            </div>`).join('');
        const certsHtml = `
            <div style="margin-bottom:8px;padding:8px 10px;background:var(--gray-100);border-radius:6px;break-inside:avoid;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                    <div>
                        <strong style="font-size:9.5pt;">Google Analytics Certification</strong>
                        <div style="font-size:8.5pt;color:var(--gray-500);margin-top:1px;">Google · 2026.01.11</div>
                    </div>
                    <span style="font-size:8pt;font-weight:700;color:var(--brand);white-space:nowrap;">취득</span>
                </div>
            </div>
            <div style="margin-bottom:8px;padding:8px 10px;background:var(--gray-100);border-radius:6px;break-inside:avoid;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                    <div>
                        <strong style="font-size:9.5pt;">TOEIC Speaking IM2</strong>
                        <div style="font-size:8.5pt;color:var(--gray-500);margin-top:1px;">ETS · 2024.09.21</div>
                    </div>
                    <span style="font-size:8pt;font-weight:700;color:var(--brand);white-space:nowrap;">취득</span>
                </div>
            </div>`;
        // 학력 텍스트 간략 파싱 (인라인 HTML → 플레인 텍스트 카드)
        const academicText = (academic || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        const academicHtml = `
            <div style="padding:10px 12px;background:var(--gray-100);border-radius:8px;">
                <div style="font-weight:800;font-size:10pt;color:var(--gray-900);">한국항공대학교</div>
                <div style="font-size:8.5pt;color:var(--brand);font-weight:700;margin:2px 0;">경영학부 경영학 전공 · 2017.03 ~ 2021.02</div>
                <div style="font-size:8.5pt;color:var(--gray-700);margin-top:4px;">
                    전체 평점 3.67 / 4.5 (133학점) &nbsp;|&nbsp; 전공 평점 3.78 / 4.5 (67학점)
                </div>
            </div>`;
        // 보유기술 텍스트 파싱 → 깔끔한 테이블 형태
        const skillGroups = [
            { icon: '📊', name: 'Data & Analytics', items: [['Tableau','Intermediate'],['Google Analytics 4','Certified'],['Python (Text Mining)','Basic']] },
            { icon: '⚙️', name: 'Automation & Dev',  items: [['Google Apps Script','Intermediate'],['MAKE (Integromat)','Workflow'],['HTML / CSS','Basic']] },
            { icon: '🤖', name: 'HR Tech & AI',       items: [['Ninehire (ATS)','Admin'],['GPT Agent Design','Prompt Eng.'],['Slack / Notion / Teams','Collaboration']] },
            { icon: '📝', name: 'Office & Docs',      items: [['Excel / Google Sheets','Advanced'],['PowerPoint','Proficient'],['Word / HWP','Proficient']] }
        ];
        const skillsHtml = skillGroups.map(g => `
            <div style="margin-bottom:5px;">
                <div style="font-size:8.5pt;font-weight:800;color:var(--brand);margin-bottom:2px;">${g.icon} ${g.name}</div>
                <table style="width:100%;border-collapse:collapse;">
                    ${g.items.map(([name, level]) => `
                    <tr>
                        <td style="font-size:8pt;color:var(--gray-700);padding:1px 0;">${name}</td>
                        <td style="font-size:7.5pt;font-weight:700;color:var(--gray-500);text-align:right;white-space:nowrap;">${level}</td>
                    </tr>`).join('')}
                </table>
            </div>`).join('');
        return `<div class="print-section">
            <h2>교육 · 기술 · 자격증</h2>
            <!-- 2열: 왼쪽(학력+자격증) | 오른쪽(보유기술), 직무교육은 아래 full-width -->
            <div class="two-col" style="align-items:start;">
                <div>
                    <div class="edu-section"><h3>학력</h3>${academicHtml}</div>
                    <div class="edu-section" style="margin-top:12px;"><h3>자격증</h3>${certsHtml}</div>
                </div>
                <div>
                    <div class="edu-section"><h3>보유 기술</h3>${skillsHtml}</div>
                </div>
            </div>
            <!-- 직무교육: full-width 2-column flex row -->
            <div style="margin-top:14px;">
                <div class="edu-section"><h3>직무 교육 이수</h3>
                <div style="display:flex;gap:12px;">${trainingHtml}</div>
                </div>
            </div>
        </div>`;
    }

    // ── 활동
    function renderActivities() {
        if (!D.activitiesList?.length) return '';
        const items = D.activitiesList.map(a => `
            <div class="act-item" style="margin-bottom:10px;padding:10px 12px;background:#f8fafc;border-radius:8px;break-inside:avoid;page-break-inside:avoid;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                    <div>
                        <strong>${a.icon || ''} ${a.title || ''}</strong>
                        <div style="font-size:9pt;color:#64748b;">${a.role || ''} · ${a.period || ''}</div>
                    </div>
                    ${a.rank ? `<span style="font-size:8.5pt;font-weight:700;color:#4f46e5;background:#ede9fe;padding:2px 8px;border-radius:99px;">${a.rank}</span>` : ''}
                </div>
            </div>`).join('');
        return `<div class="print-section"><h2>외부 활동</h2>${items}</div>`;
    }

    // ── 전체 렌더 (3개 명시적 A4 페이지)
    page.innerHTML = `
        <div class="a4-page">
            ${renderHeader()}
            ${renderImpact()}
            <div class="print-section">
                <h2>소개</h2>
                <p>${(D.heroHeadlineHTML||'').replace(/<[^>]+>/g,' ').trim()}</p>
                <p style="margin-top:6px;">${(D.heroDescription||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}</p>
            </div>
            ${renderCareers(0, 3)}
        </div>
        <div class="a4-page">
            ${renderCareers(3, 6, true)}
            ${renderDx(true)}
        </div>
        <div class="a4-page">
            ${renderEducation()}
            ${renderActivities()}
            <div style="text-align:center;font-size:8.5pt;color:#94a3b8;margin-top:24px;padding-top:12px;border-top:1px solid #e2e8f0;">
                ${D.profileName || ''} · ${D.email || ''} · smjportfolio.com · ${D.lastUpdated || ''}
            </div>
        </div>
    `;
})();
</script>
</body>
</html>
