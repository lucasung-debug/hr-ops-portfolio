<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사이트 반영</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Pretendard', 'sans-serif'] },
          colors: { brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#2563eb', 600:'#1d4ed8' } }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Pretendard', sans-serif; letter-spacing: 0; word-break: keep-all; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-xl items-center px-4 py-10">
    <section class="w-full rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
      <div class="mb-6">
        <p class="text-xs font-bold uppercase tracking-wider text-brand-600">Notion Sync</p>
        <h1 class="mt-2 text-2xl font-black">사이트 반영</h1>
      </div>

      <div class="space-y-3">
        <label for="sync-token" class="block text-sm font-bold text-slate-700">편집자 비밀번호</label>
        <input id="sync-token" type="password" placeholder="편집자 비밀번호" autocomplete="current-password" class="w-full rounded-lg border border-slate-200 px-4 py-3 text-base outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-blue-100">
        <button id="sync-button" type="button" class="w-full rounded-lg bg-brand-600 px-4 py-3 text-sm font-black text-white shadow-sm transition hover:bg-brand-500 disabled:cursor-not-allowed disabled:bg-slate-300">
          지금 사이트에 반영
        </button>
      </div>

      <div id="sync-status" class="mt-5 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-600" role="status" aria-live="polite">
        비밀번호를 입력한 뒤 버튼을 누르세요.
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById('sync-button');
    const input = document.getElementById('sync-token');
    const statusBox = document.getElementById('sync-status');
    const notionHubUrl = 'https://app.notion.com/p/31bc27c2afbf8004a5b6e4b15d1faf9c';
    const workflowUrl = 'https://github.com/lucasung-debug/hr-ops-portfolio/actions/workflows/sync-notion.yml';

    function setStatus(html, tone) {
      const colors = {
        success: 'border-emerald-200 bg-emerald-50 text-emerald-800',
        error: 'border-red-200 bg-red-50 text-red-700',
        pending: 'border-blue-200 bg-blue-50 text-blue-800',
        neutral: 'border-slate-200 bg-slate-50 text-slate-600'
      };
      statusBox.className = `mt-5 rounded-lg border px-4 py-3 text-sm font-semibold ${colors[tone] || colors.neutral}`;
      statusBox.innerHTML = html;
    }

    async function requestSync() {
      if (button.disabled) return;
      const token = input.value.trim();
      if (!token) {
        setStatus('편집자 비밀번호를 입력하세요.', 'error');
        input.focus();
        return;
      }

      button.disabled = true;
      setStatus('동기화 요청 중입니다...', 'pending');
      try {
        const response = await fetch('/api/sync', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (response.status === 202) {
          input.value = '';
          setStatus(`✅ 동기화 시작! 1~2분 뒤 Notion 허브의 '마지막 반영' 칸을 확인하세요.<br><span class="mt-3 flex flex-col gap-1 font-bold"><a class="text-brand-600 underline" href="${notionHubUrl}" target="_blank" rel="noreferrer">Notion 허브 열기</a><a class="text-brand-600 underline" href="${workflowUrl}" target="_blank" rel="noreferrer">GitHub 실행 기록 보기</a></span>`, 'success');
        } else if (response.status === 401) {
          setStatus('비밀번호가 올바르지 않습니다.', 'error');
        } else {
          setStatus('동기화 요청 실패 — 잠시 후 다시 시도하세요.', 'error');
        }
      } catch {
        setStatus('동기화 요청 실패 — 잠시 후 다시 시도하세요.', 'error');
      } finally {
        button.disabled = false;
      }
    }

    button.addEventListener('click', requestSync);
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter') requestSync();
    });
  </script>
</body>
</html>
